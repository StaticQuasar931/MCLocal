<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minecraft Hub Launcher</title>
  <meta name="theme-color" content="#0b1020" />
  <style>
    :root{
      --bg1:#08111f;
      --bg2:#0d1628;
      --panel:rgba(16,23,38,.92);
      --panel-border:rgba(255,255,255,.08);
      --text:#eef4ff;
      --muted:#9fb2d7;
      --accent:#6ea8ff;
      --accent2:#4ce0bf;
      --shadow:0 18px 55px rgba(0,0,0,.38);
      --radius:22px;
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;
      width:100%;
      height:100%;
      font-family:Inter,Segoe UI,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(110,168,255,.18), transparent 30%),
        radial-gradient(circle at top right, rgba(76,224,191,.14), transparent 24%),
        linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
      overflow:hidden;
    }
    .wrap{
      min-height:100%;
      display:grid;
      place-items:center;
      padding:24px;
    }
    .card{
      width:min(92vw,680px);
      background:var(--panel);
      border:1px solid var(--panel-border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:28px;
      text-align:center;
      backdrop-filter:blur(10px);
    }
    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(255,255,255,.05);
      border:1px solid var(--panel-border);
      color:var(--muted);
      font-size:12px;
      font-weight:700;
      letter-spacing:.02em;
      text-transform:uppercase;
      margin-bottom:16px;
    }
    .dot{
      width:10px;
      height:10px;
      border-radius:999px;
      background:linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow:0 0 16px rgba(110,168,255,.55);
      flex:0 0 auto;
    }
    h1{
      margin:0 0 10px;
      font-size:clamp(30px,5vw,46px);
      line-height:1.05;
      letter-spacing:-.03em;
    }
    p{
      margin:0;
      color:var(--muted);
      line-height:1.5;
      font-size:15px;
    }
    .actions{
      margin-top:22px;
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
    }
    button{
      appearance:none;
      border:0;
      border-radius:14px;
      padding:14px 18px;
      font-size:15px;
      font-weight:800;
      cursor:pointer;
      transition:transform .15s ease, filter .15s ease;
    }
    button:hover{
      transform:translateY(-1px);
      filter:brightness(1.05);
    }
    button:active{transform:translateY(0)}
    .launch-btn{
      color:white;
      background:linear-gradient(135deg, var(--accent), #7b8cff);
      min-width:220px;
    }
    .status{
      margin-top:18px;
      min-height:22px;
      color:var(--muted);
      font-size:14px;
    }
    .notes{
      margin-top:18px;
      padding:14px 16px;
      border-radius:16px;
      text-align:left;
      background:rgba(255,255,255,.04);
      border:1px solid var(--panel-border);
      color:var(--muted);
      font-size:13px;
      line-height:1.5;
    }
    .notes strong{color:var(--text)}
    code{
      background:rgba(255,255,255,.06);
      padding:2px 6px;
      border-radius:8px;
    }
    @media (max-width:640px){
      .card{padding:22px 18px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="badge">
        <span class="dot"></span>
        Real About:Blank
      </div>

      <h1>Minecraft Hub</h1>
      <p>
        Click below to open the hub in a real <code>about:blank</code> tab. The outer tab stays blank and the game takes over the main frame.
      </p>

      <div class="actions">
        <button id="launchBtn" class="launch-btn" type="button">Launch Hub</button>
      </div>

      <div id="status" class="status"></div>

      <div class="notes">
        <strong>Important:</strong> keep <code>hub.html</code> and <code>split-loader.js</code> in the same folder as this file.
        The outer tab stays on <code>about:blank</code>. Only the inside frame changes.
      </div>
    </div>
  </div>

  <script>
    (function () {
      "use strict";

      const launchBtn = document.getElementById("launchBtn");
      const status = document.getElementById("status");

      function setStatus(text) {
        status.textContent = text || "";
      }

      function buildWrapperHtml() {
        const baseHref = new URL("./", location.href).href;

        return `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title></title>
  <base href="${baseHref}">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root{
      --btn-bg:rgba(10,14,24,.82);
      --btn-border:rgba(255,255,255,.12);
      --btn-text:#eef4ff;
      --shadow:0 10px 30px rgba(0,0,0,.35);
      --accent:#6ea8ff;
      --accent2:#4ce0bf;
      --warn:#ffcc66;
    }
    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:#000;
      font-family:Inter,Arial,sans-serif;
    }
    #mainFrame{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      border:none;
      display:block;
      background:#000;
    }
    #controls{
      position:fixed;
      top:10px;
      right:10px;
      z-index:9999;
      display:none;
      gap:8px;
      align-items:center;
      justify-content:flex-end;
      max-width:calc(100vw - 20px);
    }
    #controls.show{
      display:flex;
    }
    .topBtn{
      appearance:none;
      border:1px solid var(--btn-border);
      border-radius:12px;
      padding:10px 14px;
      font-size:13px;
      font-weight:800;
      cursor:pointer;
      color:var(--btn-text);
      background:var(--btn-bg);
      backdrop-filter:blur(8px);
      box-shadow:var(--shadow);
    }
    .topBtn:hover{
      filter:brightness(1.08);
    }
    #loading{
      position:fixed;
      inset:0;
      z-index:9998;
      display:none;
      align-items:center;
      justify-content:center;
      padding:20px;
      background:
        radial-gradient(circle at center, rgba(110,168,255,.16), transparent 30%),
        linear-gradient(180deg, rgba(4,7,12,.94), rgba(4,7,12,.98));
    }
    #loading.show{
      display:flex;
    }
    .loadingCard{
      width:min(92vw, 620px);
      background:rgba(16,23,38,.96);
      border:1px solid rgba(255,255,255,.08);
      border-radius:24px;
      box-shadow:0 18px 55px rgba(0,0,0,.38);
      padding:24px;
      text-align:center;
      color:#eef4ff;
    }
    .loadingCard h3{
      margin:0 0 8px;
      font-size:28px;
      letter-spacing:-.03em;
    }
    .loadingCard p{
      margin:0;
      color:#9fb2d7;
      line-height:1.55;
      font-size:14px;
    }
    .progressWrap{
      margin-top:18px;
      height:14px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      overflow:hidden;
    }
    .progressBar{
      width:0%;
      height:100%;
      background:linear-gradient(90deg,var(--accent),var(--accent2));
      transition:width .22s ease;
    }
    .progressText{
      margin-top:12px;
      color:#dbe7ff;
      font-size:14px;
      font-weight:700;
    }
    .loadingTips{
      margin-top:14px;
      text-align:left;
      background:rgba(255,255,255,.045);
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      padding:14px 16px;
      color:#9fb2d7;
      font-size:13px;
      line-height:1.55;
    }
    .loadingTips strong{
      color:var(--warn);
    }
    .loadingTips ul{
      margin:8px 0 0 18px;
      padding:0;
    }
  </style>
</head>
<body>
  <div id="controls">
    <button id="backBtn" class="topBtn" type="button">Back to Hub</button>
    <button id="fullscreenBtn" class="topBtn" type="button">Fullscreen</button>
    <button id="reloadBtn" class="topBtn" type="button">Reload Game</button>
  </div>

  <div id="loading">
    <div class="loadingCard">
      <h3 id="loadingTitle">Preparing launch...</h3>
      <p id="loadingSubtitle">Please wait while the selected version starts.</p>

      <div class="progressWrap">
        <div class="progressBar" id="progressBar"></div>
      </div>

      <div class="progressText" id="progressText">Starting...</div>

      <div class="loadingTips">
        <strong>Heads up:</strong> multiplayer servers likely will not work at most schools.
        <ul>
          <li>Offline play and local worlds are much more likely to work.</li>
          <li>If the newer version feels rough, use 1.8 Stable.</li>
          <li>First load can take longer because split files are being joined.</li>
        </ul>
      </div>
    </div>
  </div>

  <iframe
    id="mainFrame"
    src="about:blank"
    allow="fullscreen; autoplay; clipboard-read; clipboard-write; gamepad; pointer-lock"
    allowfullscreen
    sandbox="allow-scripts allow-same-origin allow-pointer-lock allow-downloads allow-forms allow-modals allow-popups allow-popups-to-escape-sandbox"
  ></iframe>

  <script type="module">
    import { SplitLoader } from "./split-loader.js";

    const frame = document.getElementById("mainFrame");
    const controls = document.getElementById("controls");
    const backBtn = document.getElementById("backBtn");
    const fullscreenBtn = document.getElementById("fullscreenBtn");
    const reloadBtn = document.getElementById("reloadBtn");

    const loading = document.getElementById("loading");
    const loadingTitle = document.getElementById("loadingTitle");
    const loadingSubtitle = document.getElementById("loadingSubtitle");
    const progressBar = document.getElementById("progressBar");
    const progressText = document.getElementById("progressText");

    const VERSION_MAP = {
      "eg1-12-2": {
        label: "1.12.2",
        subtitle: "Newer split build",
        parts: [
          "versions/EG1-12-2/split.001",
          "versions/EG1-12-2/split.002",
          "versions/EG1-12-2/split.003",
          "versions/EG1-12-2/split.004"
        ]
      },
      "eg1-8": {
        label: "1.8 Stable",
        subtitle: "Stable split build",
        parts: [
          "versions/EG1-8/split.001",
          "versions/EG1-8/split.002"
        ]
      }
    };

    let currentMode = "hub";
    let currentVersionId = null;

    function updateControlsVisibility() {
      const gameFullscreen = document.fullscreenElement === frame;
      const showControls = currentMode === "game" && !gameFullscreen;
      controls.classList.toggle("show", showControls);
    }

    function setLoading(label, subtitle) {
      loadingTitle.textContent = label;
      loadingSubtitle.textContent = subtitle;
      progressBar.style.width = "0%";
      progressText.textContent = "Starting...";
      loading.classList.add("show");
    }

    function hideLoadingSoon() {
      setTimeout(() => {
        loading.classList.remove("show");
      }, 500);
    }

    function loadHub() {
      currentMode = "hub";
      currentVersionId = null;
      loading.classList.remove("show");
      frame.src = "hub.html";
      updateControlsVisibility();
    }

    async function launchHubVersion(versionId) {
      const config = VERSION_MAP[versionId];
      if (!config) {
        console.error("Unknown version id:", versionId);
        return;
      }

      currentMode = "game";
      currentVersionId = versionId;
      updateControlsVisibility();

      setLoading(
        "Loading " + config.label,
        config.subtitle + ". Please wait while the files are joined and launched."
      );

      try {
        await SplitLoader.loadIntoFrame({
          frame,
          id: versionId,
          parts: config.parts,
          onProgress(info) {
            const pct = Math.max(0, Math.min(100, Math.round((info.current / info.total) * 100)));
            progressBar.style.width = pct + "%";
            progressText.textContent = "Loading part " + info.current + " of " + info.total;
          },
          onBeforeLoad() {
            progressText.textContent = "Building the page...";
          },
          onAfterLoad() {
            progressBar.style.width = "100%";
            progressText.textContent = config.label + " loaded.";
            hideLoadingSoon();
            updateControlsVisibility();
          }
        });
      } catch (err) {
        console.error(err);
        progressText.textContent = "Failed to load.";
        setTimeout(() => {
          loadHub();
        }, 900);
      }
    }

    async function toggleGameFullscreen() {
      try {
        if (document.fullscreenElement === frame) {
          if (document.exitFullscreen) {
            await document.exitFullscreen();
          }
        } else {
          if (frame.requestFullscreen) {
            await frame.requestFullscreen();
          } else if (frame.webkitRequestFullscreen) {
            await frame.webkitRequestFullscreen();
          }
        }
      } catch (err) {
        console.error("Game fullscreen failed:", err);
      } finally {
        updateControlsVisibility();
      }
    }

    function reloadCurrentGame() {
      if (!currentVersionId) return;
      launchHubVersion(currentVersionId);
    }

    backBtn.addEventListener("click", () => {
      loadHub();
    });

    fullscreenBtn.addEventListener("click", () => {
      toggleGameFullscreen();
    });

    reloadBtn.addEventListener("click", () => {
      reloadCurrentGame();
    });

    document.addEventListener("fullscreenchange", () => {
      updateControlsVisibility();
    });

    window.addEventListener("message", (event) => {
      const data = event.data;
      if (!data || typeof data !== "object") return;

      if (data.type === "mcHubLaunchVersion" && typeof data.versionId === "string") {
        launchHubVersion(data.versionId);
      }
    });

    window.launchHubVersion = launchHubVersion;

    loadHub();

    window.onbeforeunload = function () {
      return "Are you sure you want to leave? Your session may be interrupted.";
    };
  <\/script>
</body>
</html>`;
      }

      function launchAboutBlankHub() {
        setStatus("");

        const newTab = window.open("about:blank", "_blank");
        if (!newTab) {
          setStatus("Popup blocked. Allow popups for this site, then try again.");
          return;
        }

        try {
          const doc = newTab.document;
          doc.open();
          doc.write(buildWrapperHtml());
          doc.close();
          setStatus("Hub launched in a real about:blank tab.");
        } catch (err) {
          console.error(err);
          setStatus("Failed to create the about:blank wrapper.");
        }
      }

      launchBtn.addEventListener("click", launchAboutBlankHub);

      window.onbeforeunload = function () {
        return "Are you sure you want to leave? Your session may be interrupted.";
      };
    })();
  </script>
</body>
</html>
