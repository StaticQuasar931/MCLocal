<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Launch Minecraft Hub</title>
  <meta name="description" content="Launch the Minecraft hub inside a real about:blank wrapper." />
  <style>
    :root{
      --bg1:#08111f;
      --bg2:#0d1628;
      --panel:rgba(16,23,38,.92);
      --panel-border:rgba(255,255,255,.08);
      --text:#eef4ff;
      --muted:#9fb2d7;
      --accent:#6ea8ff;
      --accent2:#4ce0bf;
      --shadow:0 18px 55px rgba(0,0,0,.38);
      --radius:22px;
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;
      width:100%;
      height:100%;
      font-family:Inter,Segoe UI,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(110,168,255,.18), transparent 30%),
        radial-gradient(circle at top right, rgba(76,224,191,.14), transparent 24%),
        linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
      overflow:hidden;
    }
    .wrap{
      min-height:100%;
      display:grid;
      place-items:center;
      padding:24px;
    }
    .card{
      width:min(92vw,720px);
      background:var(--panel);
      border:1px solid var(--panel-border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:28px;
      text-align:center;
      backdrop-filter:blur(10px);
    }
    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(255,255,255,.05);
      border:1px solid var(--panel-border);
      color:var(--muted);
      font-size:12px;
      font-weight:700;
      letter-spacing:.02em;
      text-transform:uppercase;
      margin-bottom:16px;
    }
    .dot{
      width:10px;
      height:10px;
      border-radius:999px;
      background:linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow:0 0 16px rgba(110,168,255,.55);
      flex:0 0 auto;
    }
    h1{
      margin:0 0 10px;
      font-size:clamp(30px,5vw,46px);
      line-height:1.05;
      letter-spacing:-.03em;
    }
    p{
      margin:0;
      color:var(--muted);
      line-height:1.5;
      font-size:15px;
    }
    .actions{
      margin-top:22px;
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
    }
    button{
      appearance:none;
      border:0;
      border-radius:14px;
      padding:14px 18px;
      font-size:15px;
      font-weight:800;
      cursor:pointer;
      transition:transform .15s ease, opacity .15s ease, filter .15s ease;
    }
    button:hover{
      transform:translateY(-1px);
      filter:brightness(1.05);
    }
    button:active{transform:translateY(0)}
    .launch-btn{
      color:white;
      background:linear-gradient(135deg, var(--accent), #7b8cff);
      min-width:220px;
    }
    .status{
      margin-top:18px;
      min-height:22px;
      color:var(--muted);
      font-size:14px;
    }
    .notes{
      margin-top:18px;
      padding:14px 16px;
      border-radius:16px;
      text-align:left;
      background:rgba(255,255,255,.04);
      border:1px solid var(--panel-border);
      color:var(--muted);
      font-size:13px;
      line-height:1.5;
    }
    .notes strong{color:var(--text)}
    code{
      background:rgba(255,255,255,.06);
      padding:2px 6px;
      border-radius:8px;
    }
    @media (max-width:640px){
      .card{padding:22px 18px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="badge">
        <span class="dot"></span>
        Real About:Blank Launcher
      </div>

      <h1>Minecraft Hub</h1>
      <p>
        Click below to open the hub inside a real about:blank wrapper with fullscreen support.
      </p>

      <div class="actions">
        <button id="launchBtn" class="launch-btn" type="button">Launch Hub</button>
      </div>

      <div id="status" class="status"></div>

      <div class="notes">
        <strong>Important:</strong> keep <code>hub.html</code> in the same folder as this file.
        This launcher opens a true <code>about:blank</code> tab, writes the wrapper into it,
        and loads <code>hub.html</code> inside an iframe.
      </div>
    </div>
  </div>

  <script>
    (function () {
      "use strict";

      const launchBtn = document.getElementById("launchBtn");
      const status = document.getElementById("status");

      function setStatus(text) {
        status.textContent = text || "";
      }

      function buildWrapperHtml() {
        return `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>about:blank</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
    }

    #hubFrame {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      background: #000;
    }

    #topBar {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 999999;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .topBtn {
      appearance: none;
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      color: #fff;
      background: rgba(20, 20, 24, 0.88);
      box-shadow: 0 8px 20px rgba(0,0,0,.35);
      backdrop-filter: blur(8px);
    }

    .topBtn:hover {
      filter: brightness(1.08);
    }

    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      background: #000;
      font-size: 18px;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="loading">Loading Minecraft Hub...</div>

  <div id="topBar">
    <button id="fullscreenBtn" class="topBtn" type="button">Go Fullscreen</button>
    <button id="reloadBtn" class="topBtn" type="button">Reload Hub</button>
  </div>

  <iframe
    id="hubFrame"
    allow="fullscreen; autoplay; clipboard-read; clipboard-write; gamepad; pointer-lock"
    allowfullscreen
    referrerpolicy="no-referrer"
    sandbox="allow-scripts allow-same-origin allow-pointer-lock allow-downloads allow-forms allow-modals allow-popups allow-popups-to-escape-sandbox"
  ></iframe>

  <script>
    (function () {
      "use strict";

      var frame = document.getElementById("hubFrame");
      var loading = document.getElementById("loading");
      var fullscreenBtn = document.getElementById("fullscreenBtn");
      var reloadBtn = document.getElementById("reloadBtn");

      function loadHub() {
        frame.src = "hub.html";
      }

      async function goFullscreen() {
        try {
          var el = document.documentElement;
          if (el.requestFullscreen) {
            await el.requestFullscreen();
          } else if (el.webkitRequestFullscreen) {
            await el.webkitRequestFullscreen();
          } else if (el.msRequestFullscreen) {
            await el.msRequestFullscreen();
          }
        } catch (err) {
          console.error("Fullscreen failed:", err);
        }
      }

      frame.addEventListener("load", function () {
        if (loading) {
          loading.style.display = "none";
        }
      });

      fullscreenBtn.addEventListener("click", function () {
        goFullscreen();
      });

      reloadBtn.addEventListener("click", function () {
        loading.style.display = "flex";
        loadHub();
      });

      loadHub();

      setTimeout(function () {
        goFullscreen();
      }, 150);

      window.addEventListener("beforeunload", function (e) {
        e.preventDefault();
        e.returnValue = "Are you sure you want to leave?";
      });
    })();
  <\/script>
</body>
</html>`;
      }

      function launchAboutBlankHub() {
        setStatus("");

        const newTab = window.open("", "_blank");

        if (!newTab) {
          setStatus("Popup blocked. Allow popups for this site, then try again.");
          return;
        }

        try {
          const doc = newTab.document;
          doc.open();
          doc.write(buildWrapperHtml());
          doc.close();
          setStatus("Hub launched in a real about:blank tab.");
        } catch (err) {
          console.error(err);
          setStatus("Failed to create the about:blank wrapper.");
        }
      }

      launchBtn.addEventListener("click", launchAboutBlankHub);
    })();
  </script>
</body>
</html>
